version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: "00:00"
      timezone: UTC
  - package-ecosystem: npm
    schedule:
      interval: weekly
      day: friday
      time: "00:00"
      timezone: UTC
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
